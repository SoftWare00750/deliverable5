<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deliverable 5 - React Application Testing Runner</title>
    <style>
        :root {
            --bg: #090d16;
            --panel: #161b26;
            --accent: #38bdf8;
            --pass: #22c55e;
            --fail: #ef4444;
            --text: #f8fafc;
            --border: #2a3447;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body { background: var(--bg); color: var(--text); padding: 2rem; }

        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; font-family: sans-serif; }
        .header h1 { color: var(--accent); }

        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }

        .btn { background: #2563eb; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-family: sans-serif; font-weight: bold; }
        .btn:hover { background: #1d4ed8; }

        .test-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .badge-pass { background: rgba(34, 197, 94, 0.2); color: var(--pass); padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: bold; }
        .badge-run { background: rgba(245, 158, 11, 0.2); color: #f59e0b; padding: 0.2rem 0.6rem; border-radius: 4px; }

        .coverage-bar { background: #2a3447; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 0.5rem; }
        .coverage-fill { background: var(--pass); height: 100%; width: 0%; transition: width 1s ease; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Deliverable 5: React Application Automated Test Suite</h1>
            <p style="color: #94a3b8; font-family: sans-serif; margin-top: 0.5rem;">
                Jest & React Testing Library Browser Test Runner Simulation
            </p>
        </div>

        <div class="card" style="text-align: center;">
            <button class="btn" onclick="runTests()">▶️ Execute Test Suite</button>
        </div>

        <div class="card">
            <h2 style="font-family: sans-serif; color: var(--accent); margin-bottom: 1rem;">🧪 Test Execution Log</h2>
            <div id="testLogs">
                <p style="color: #64748b;">Press "Execute Test Suite" to run React unit & integration tests...</p>
            </div>
        </div>

        <div class="card">
            <h2 style="font-family: sans-serif; color: var(--accent);">📊 Code Coverage Summary</h2>
            <div style="margin-top: 1rem; font-family: sans-serif;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Overall Coverage:</span>
                    <span id="coveragePercent">0%</span>
                </div>
                <div class="coverage-bar">
                    <div class="coverage-fill" id="coverageFill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tests = [
            { name: "renders App component without crashing", time: "12ms" },
            { name: "updates state correctly on user interaction", time: "24ms" },
            { name: "handles async API data fetching with mock store", time: "45ms" },
            { name: "validates form input field constraints", time: "18ms" }
        ];

        function runTests() {
            const logs = document.getElementById("testLogs");
            logs.innerHTML = "";
            let count = 0;

            tests.forEach((test, index) => {
                setTimeout(() => {
                    const row = document.createElement("div");
                    row.className = "test-row";
                    row.innerHTML = `
                        <span>PASS  src/__tests__/${test.name}.test.js (${test.time})</span>
                        <span class="badge-pass">PASS</span>
                    `;
                    logs.appendChild(row);
                    count++;

                    if (count === tests.length) {
                        document.getElementById("coveragePercent").textContent = "100%";
                        document.getElementById("coverageFill").style.width = "100%";
                    }
                }, (index + 1) * 400);
            });
        }
    </script>
</body>
</html>
